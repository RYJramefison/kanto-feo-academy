openapi: 3.0.3
info:
  title: Kanto-Feo Academy API
  description: API pour la gestion de l'académie de musique Kanto-Feo
  version: 1.0.0
  contact:
    name: Kanto-Feo Team
    email: support@kanto-feo.com

servers:
  - url: http://localhost:3000
    description: Serveur de développement
  - url: https://api.kanto-feo.com
    description: Serveur de production

paths:
  /admin:
    get:
      tags:
        - Admin
      summary: Récupérer tous les administrateurs
      description: Retourne la liste de tous les administrateurs avec leurs étudiants et cours
      responses:
        '200':
          description: Liste des administrateurs récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Admin'
    post:
      tags:
        - Admin
      summary: Créer un nouvel administrateur
      description: Crée un nouvel administrateur avec hashage du mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminDto'
      responses:
        '201':
          description: Administrateur créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
        '400':
          description: Données invalides
        '409':
          description: Email déjà utilisé

  /admin/{id}:
    get:
      tags:
        - Admin
      summary: Récupérer un administrateur par ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Administrateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
        '404':
          description: Administrateur non trouvé
    patch:
      tags:
        - Admin
      summary: Mettre à jour un administrateur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminDto'
      responses:
        '200':
          description: Administrateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
        '404':
          description: Administrateur non trouvé
    delete:
      tags:
        - Admin
      summary: Supprimer un administrateur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Administrateur supprimé
        '404':
          description: Administrateur non trouvé

  /admin/email/{email}:
