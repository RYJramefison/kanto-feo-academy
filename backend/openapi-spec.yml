          description: Notification non trouvée
    patch:
      tags:
        - Notification
      summary: Mettre à jour une notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationDto'
      responses:
        '200':
          description: Notification mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          description: Notification non trouvée
    delete:
      tags:
        - Notification
      summary: Supprimer une notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Notification supprimée
        '404':
          description: Notification non trouvée

  /notification/student/{studentId}:
    get:
      tags:
        - Notification
      summary: Récupérer les notifications d'un étudiant
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des notifications de l'étudiant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

  /notification/type/{type}:
    get:
      tags:
        - Notification
      summary: Récupérer les notifications par type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NotificationType'
      responses:
        '200':
          description: Liste des notifications par type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

